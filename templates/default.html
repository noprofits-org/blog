<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="NoProfits Blog — notes on data, nonprofits, and the tools we build to make sense of them.">
    <title>$title$ — NoProfits Blog</title>

    <!-- Set theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/default.css" />
    <link rel="alternate" type="application/atom+xml" title="noprofits.org (Atom)" href="/atom.xml">
    <link rel="alternate" type="application/rss+xml" title="noprofits.org (RSS)" href="/rss.xml">

    <script defer src="/js/theme-toggle.js"></script>
    <script defer src="/js/mathjax-config.js"></script>
    <script defer src="/js/code-copy.js"></script>
    <script defer id="MathJax-script"
        src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"
        integrity="sha384-Wuix6BuhrWbjDBs24bXrjf4ZQ5aFeFWBuKkFekO2t8xFU0iNaLQfp2K6/1Nxveei"
        crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
</head>

<body>

        <a class="brand" href="/">
            <span class="brand-tick"></span>
            <span class="brand-name">NoProfits<span class="muted">Blog</span></span>
        </a>
        <nav class="site-nav">
            <a href="/">Home</a>
            <a href="/about.html">About</a>
            <a href="/archive.html">Archive</a>
            <a href="/contact.html">Contact</a>
            <span class="theme-toggle" role="group" aria-label="Color theme">
                <button type="button" data-theme="light" aria-pressed="false">Light</button>
                <button type="button" data-theme="dark" aria-pressed="false">Dark</button>
            </span>
        </nav>
    </header>

    <main role="main">
        $body$
    </main>

    <footer class="site-footer">

            <div class="footer-brand-col">

                    <span class="brand-tick"></span>
                    <span class="footer-name">NoProfits<span class="muted">Blog</span></span>
                </div>
                <p class="footer-tagline">Site generated by <a href="http://jaspervdj.be/hakyll">Hakyll</a>, authored by <a href="https://noprofits.org">No Profits</a>. Select content assisted by <a href="https://www.anthropic.com/claude">Claude</a>.</p>
            </div>
            <div class="footer-cols">
                <div class="footer-col">
                    <h4>Site</h4>
                    <a href="/">Home</a>
                    <a href="/about.html">About</a>
                    <a href="/archive.html">Archive</a>
