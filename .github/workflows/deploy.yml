name: Build and Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Haskell Stack
      uses: haskell-actions/setup@v2
      with:
        ghc-version: '9.4.8'

    - name: Cache Stack dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.stack
          .stack-work
        key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'package.yaml', '*.cabal') }}
        restore-keys: |
          ${{ runner.os }}-stack-

    - name: Install Stack dependencies
      run: |
        stack setup
        stack update

    - name: Cache APT package downloads
      uses: actions/cache@v4
      with:
        path: /tmp/apt-cache
        # Bump the trailing version (v1) to invalidate when the package list changes.
        key: ${{ runner.os }}-apt-texlive-v1

    - name: Install LaTeX and pdf2svg
      run: |
        mkdir -p /tmp/apt-cache/partial
        sudo apt-get update
        # Download .debs into the cached dir and still run dpkg configure so
        # TeX Live format/map generation happens normally on every run.
        sudo apt-get -o Dir::Cache::archives="/tmp/apt-cache" install -y \
          texlive-latex-extra texlive-pictures texlive-science pdf2svg \
          texlive-plain-generic texlive-fonts-recommended
        sudo chmod -R a+r /tmp/apt-cache

    - name: Build Hakyll site
      run: |
        stack build
        stack exec blog build

    - name: Create CNAME file
      if: github.event_name != 'pull_request'
      run: |
        echo "blog.noprofits.org" > _site/CNAME
        touch _site/.nojekyll

    - name: Deploy to GitHub Pages
      if: github.event_name != 'pull_request'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        cname: blog.noprofits.org
        force_orphan: true
